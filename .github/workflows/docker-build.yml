name: Docker build

on:
  workflow_dispatch:
  
  schedule:
    - cron: '0 0 * * 1'  # every Monday 00:00 UTC

jobs:
  docker:
    name: 'Docker Image'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config:
          - {
              base_image: "ubuntu:24.04",
              base_image_label: "ubuntu24.04",
              work_dir: "docker/",
              yarp_branch: "yarp-3.12",
              yarp_branch_label: "yarp3.12"
            }
          - {
              base_image: "ubuntu:24.04",
              base_image_label: "ubuntu24.04",
              work_dir: "docker/",
              yarp_branch: "master",
              yarp_branch_label: "yarp4.0"  
          }
    permissions:
      contents: read
      packages: write
      
    steps:
      - name: Info
        run: |
         echo "Event type: ${{github.event_name}}"
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up QEMU for arm64 emulation
        uses: docker/setup-qemu-action@v4
        with:
          platforms: linux/arm64

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
         registry: ghcr.io
         username: ${{ github.actor }}
         password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push yarp image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.config.work_dir }}
          file: ${{ matrix.config.work_dir }}/Dockerfile
          build-args: |
            base_img=${{matrix.config.base_image}}
            yarp_branch=${{matrix.config.yarp_branch}}
          platforms: linux/amd64,linux/arm64
          push: true
          outputs: type=registry
          tags: |
            ghcr.io/${{ github.repository_owner }}/yarp:${{matrix.config.base_image_label}}_${{matrix.config.yarp_branch_label}}
